server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/memos_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root   # ← 改成你自己的 MySQL 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL日志，方便调试
  global-config:
    db-config:
      logic-delete-field: isDeleted   # 软删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0